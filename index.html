<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opsistech</title>

<!-- CORRECT FONT -->
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body, html {
  margin: 0;
  padding: 0;
  font-family: "Instrument Sans", sans-serif;
  background: #f2f2f2;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: center;
  z-index: 1000;
  border-bottom: 1px solid #ddd;
}

nav {
  display: flex;
  gap: 60px;
  padding: 18px;
}

nav a {
  text-decoration: none;
  color: black;
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 500;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CENTER BOX */
.box {
  background: #8f8f8f;
  padding: 80px 60px;
  text-align: center;
  width: 80%;
  max-width: 900px;
}

/* MAIN TITLE */
h1 {
  font-family: "Instrument Serif", serif;
  font-size: 72px;
  letter-spacing: 2px;
  color: white;
  margin: 0 0 20px 0;
}

/* SUBTITLE */
p {
  font-family: "Instrument Serif", serif;
  font-size: 24px;
  color: #eaeaea;
  margin: 0;
}
</style>
</head>

<body>

<header>
  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="box">
    <h1>OPSISTECH</h1>
    <p>Engineering Vision into Reality</p>
  </div>
</section>

</body>
</html>
