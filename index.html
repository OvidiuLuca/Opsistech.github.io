<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opsistech</title>

<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body, html {
  margin: 0;
  padding: 0;
  font-family: "Instrument Sans", sans-serif;
  background: #f2f2f2;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: center;
  z-index: 1000;
  border-bottom: 1px solid #ddd;
}

/* NAV */
nav {
  display: flex;
  gap: 40px;
  padding: 15px;
  flex-wrap: wrap; /* KEY FIX */
  justify-content: center;
}

nav a {
  text-decoration: none;
  color: black;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 500;
  white-space: nowrap; /* prevents breaking */
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* BOX */
.box {
  background: #8f8f8f;
  padding: 60px 30px;
  text-align: center;
  width: 90%;
  max-width: 900px;
}

/* TITLE */
h1 {
  font-family: "Instrument Serif", serif;
  font-size: 52px;
  letter-spacing: 2px;
  color: white;
  margin: 0 0 20px 0;
}

/* SUBTITLE */
p {
  font-family: "Instrument Serif", serif;
  font-size: 20px;
  color: #eaeaea;
  margin: 0;
}

/* MOBILE OPTIMIZATION */
@media (max-width: 600px) {
  nav {
    gap: 20px;
  }

  nav a {
    font-size: 11px;
    letter-spacing: 1.5px;
  }

  h1 {
    font-size: 36px;
  }

  p {
    font-size: 16px;
  }
}
</style>
</head>

<body>

<header>
  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="box">
    <h1>OPSISTECH</h1>
    <p>Engineering Vision into Reality</p>
  </div>
</section>

</body>
</html>
